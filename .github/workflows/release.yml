name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Validate semver tag
        id: validate
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$TAG_NAME" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "asset_name=ketal-${TAG_NAME}-x86_64-unknown-linux-gnu" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag '$TAG_NAME' is not a semver tag. Skipping release."
          fi

      - name: Check out repository
        if: steps.validate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        if: steps.validate.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        if: steps.validate.outputs.skip != 'true'
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        if: steps.validate.outputs.skip != 'true'
        run: cargo build --release --locked --bin ketal

      - name: Prepare release asset
        if: steps.validate.outputs.skip != 'true'
        run: cp target/release/ketal "${{ steps.validate.outputs.asset_name }}"

      - name: Publish GitHub release
        if: steps.validate.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.validate.outputs.asset_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          prerelease: ${{ contains(github.ref_name, '-') }}
